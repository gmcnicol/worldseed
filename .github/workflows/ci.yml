name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
