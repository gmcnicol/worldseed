name: publish-devlog

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "README.md"
      - "TASKS.md"
      - ".github/workflows/devlog-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish development log
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Check development log artifact
        run: |
          test -f docs/index.html
          grep -q "Worldseed Development Log" docs/index.html
          grep -q "Phase 1" docs/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
